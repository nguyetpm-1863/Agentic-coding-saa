name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
      - staging
      - production
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        type: choice
        options:
          - staging
          - production

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.environment || (github.ref_name == 'production' && 'production') || 'staging' }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-22.04
    name: Deploy
    environment: ${{ github.event.inputs.environment || (github.ref_name == 'production' && 'production') || 'staging' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run Supabase migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_ID: ${{ vars.SUPABASE_PROJECT_ID }}
        run: |
          if [ -z "$SUPABASE_PROJECT_ID" ]; then
            echo "::error::SUPABASE_PROJECT_ID is not set. Add it as a repository variable in GitHub Settings > Environments."
            exit 1
          fi
          yarn supabase link --project-ref "$SUPABASE_PROJECT_ID"
          yarn supabase db push --include-all

      - name: Deploy new worker version
        id: upload
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e

          yarn opennextjs-cloudflare build --env ${{ github.event.inputs.environment || (github.ref_name == 'production' && 'production') || 'staging' }}

          echo SUPABASE_SECRET_KEY="${{ secrets.SUPABASE_SECRET_KEY }}" >> /tmp/.env.worker

          yarn wrangler versions secret bulk /tmp/.env.worker --env ${{ github.event.inputs.environment || (github.ref_name == 'production' && 'production') || 'staging' }}

          yarn opennextjs-cloudflare upload --env ${{ github.event.inputs.environment || (github.ref_name == 'production' && 'production') || 'staging' }} \
            --var "NEXT_PUBLIC_SUPABASE_URL:'${{ vars.NEXT_PUBLIC_SUPABASE_URL }}'" \
            --var "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:'${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}'" | tee /tmp/upload_output

          version_id=$(cat /tmp/upload_output | grep -oP 'Worker Version ID: \K\S+' || echo "")
          if [ -z "$version_id" ]; then
            echo "Warning: Could not find Worker Version ID in the upload output. Deploying latest version instead."
          fi

          yarn wrangler versions deploy --env ${{ github.event.inputs.environment || (github.ref_name == 'production' && 'production') || 'staging' }} $version_id@100 -y

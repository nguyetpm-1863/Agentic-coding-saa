name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
      - staging
      - production
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        type: choice
        options:
          - staging
          - production

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.environment || (github.ref_name == 'production' && 'production') || 'staging' }}
  cancel-in-progress: false

env:
  DEPLOY_ENV: ${{ github.event.inputs.environment || (github.ref_name == 'production' && 'production') || 'staging' }}

jobs:
  deploy:
    runs-on: ubuntu-22.04
    name: Deploy
    environment: ${{ github.event.inputs.environment || (github.ref_name == 'production' && 'production') || 'staging' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run Supabase migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_ID: ${{ vars.SUPABASE_PROJECT_ID }}
        run: |
          set -e

          if [ -z "$SUPABASE_PROJECT_ID" ]; then
            echo "::error::SUPABASE_PROJECT_ID is not set. Add it as a repository/environment variable in GitHub Settings."
            exit 1
          fi

          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN is not set. Add it as a secret in GitHub Settings."
            exit 1
          fi

          yarn supabase link --project-ref "$SUPABASE_PROJECT_ID"
          yarn supabase db push --include-all

      - name: Deploy new worker version
        id: upload
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e

          yarn opennextjs-cloudflare build --env "$DEPLOY_ENV"

          yarn opennextjs-cloudflare upload --env "$DEPLOY_ENV" \
            --var "NEXT_PUBLIC_SUPABASE_URL:'${{ vars.NEXT_PUBLIC_SUPABASE_URL }}'" \
            --var "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY:'${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}'" | tee /tmp/upload_output

          printf "SUPABASE_SECRET_KEY=%s\n" "$SUPABASE_SECRET_KEY" > /tmp/.env.worker
          yarn wrangler versions secret bulk /tmp/.env.worker --env "$DEPLOY_ENV"
          rm -f /tmp/.env.worker

          yarn wrangler versions deploy --env "$DEPLOY_ENV"y
